name: build

# Builds the Android debug APK on every push: web bundle (Vite) → Capacitor sync
# → Gradle assembleDebug. The APK is uploaded as an artifact (unsigned debug build).
on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  android:
    name: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # google-services.json is NOT committed (it carries the Firebase Android API key
      # and this repo is public). It's injected from a base64 secret so CI builds are
      # FCM-capable. Absent the secret, the app still builds — the google-services
      # plugin is applied conditionally, so it just builds without push.
      - name: Write google-services.json (FCM)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "Wrote android/app/google-services.json ($(wc -c < android/app/google-services.json) bytes)"
          else
            echo "::warning::GOOGLE_SERVICES_JSON secret not set — building without FCM/push."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Gradle assembleDebug
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remote-browser-keeper-android
          if-no-files-found: error
          path: android/app/build/outputs/apk/debug/*.apk
