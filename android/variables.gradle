ext {
    minSdkVersion = 22
    compileSdkVersion = 34
    targetSdkVersion = 34
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'

    // 16 KB page-size compatible native libs for @capacitor-mlkit/barcode-scanning.
    // The plugin defaults (CameraX 1.1.0, MLKit 17.2.0) ship .so files whose ELF LOAD
    // segments aren't 16 KB-aligned, which Android 15 (16 KB pages) warns about. These
    // newer releases are built with 16 KB alignment. The plugin reads them from ext.
    androidxCameraCamera2Version = '1.4.1'
    androidxCameraCoreVersion = '1.4.1'
    androidxCameraLifecycleVersion = '1.4.1'
    androidxCameraViewVersion = '1.4.1'
    mlkitBarcodeScanningVersion = '17.3.0'
    playServicesCodeScannerVersion = '16.1.0'
}